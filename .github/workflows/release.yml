name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
      ENABLE_NPM_PROVENANCE: ${{ github.event.repository.private == false }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Lint GitHub workflows
        run: node ./scripts/lint-workflows.mjs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release artifacts
        run: pnpm release:check

      - name: Create release PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          commit: "ci: version packages"
          title: "ci: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure npm auth for token publishing
        if: ${{ steps.changesets.outputs.hasChangesets == 'false' && env.HAS_NPM_TOKEN == 'true' }}
        shell: bash
        run: |
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$HOME/.npmrc"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Validate publish credential mode
        if: ${{ steps.changesets.outputs.hasChangesets == 'false' && env.HAS_NPM_TOKEN != 'true' && github.event.repository.private == true }}
        run: |
          echo "Trusted publishing cannot publish from a private GitHub repository."
          echo "Configure NPM_TOKEN or switch the repository to public before running release."
          exit 1

      - name: Publish packages with npm token
        if: ${{ steps.changesets.outputs.hasChangesets == 'false' && env.HAS_NPM_TOKEN == 'true' }}
        run: pnpm publish:packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: ${{ env.ENABLE_NPM_PROVENANCE }}

      - name: Publish packages with trusted publishing
        if: ${{ steps.changesets.outputs.hasChangesets == 'false' && env.HAS_NPM_TOKEN != 'true' }}
        run: pnpm publish:packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push release tags
        if: ${{ steps.changesets.outputs.hasChangesets == 'false' }}
        run: git push origin --tags
